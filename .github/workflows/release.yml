name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Gates
        run: |
          python3 check_state.py
          python3 check_wids.py
      - name: Build plugin at tag version
        run: |
          VER="${GITHUB_REF_NAME#v}"
          python3 install.py cowork --version "$VER"
          (cd dist && shasum -a 256 *.plugin > SHA256SUMS)
      - name: Create release with artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.plugin dist/SHA256SUMS \
            --title "$GITHUB_REF_NAME" --generate-notes
